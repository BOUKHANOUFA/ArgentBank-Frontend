swagger: "2.0"

info:
  title: ArgentBank Transactions API
  description: API permettant de gérer les informations des transactions
  version: "1.0.0"

basePath: /api/v1

schemes:
  - https

paths:

  /accounts/{accountId}/transactions:

    get:
      summary: Récupérer les transactions d'un compte
      description: Retourne toutes les transactions du mois en cours pour un compte bancaire donné.

      parameters:
        - name: accountId
          in: path
          required: true
          type: string
          description: Identifiant du compte bancaire

      responses:

        200:
          description: Liste des transactions récupérée avec succès
          schema:
            type: object
            properties:

              accountId:
                type: string
                example: "x3448"

              transactions:
                type: array
                items:
                  $ref: "#/definitions/Transaction"


        404:
          description: Compte bancaire introuvable


        500:
          description: Erreur serveur



  /transactions/{transactionId}:


    get:

      summary: Récupérer le détail d'une transaction
      description: Retourne les informations détaillées d'une transaction.


      parameters:

        - name: transactionId
          in: path
          required: true
          type: string
          description: Identifiant de la transaction


      responses:

        200:
          description: Détails de la transaction récupérés
          schema:
            $ref: "#/definitions/Transaction"


        404:
          description: Transaction introuvable


        500:
          description: Erreur serveur



    patch:

      summary: Modifier les informations d'une transaction
      description: Permet de modifier la catégorie et les notes d'une transaction.


      parameters:

        - name: transactionId
          in: path
          required: true
          type: string
          description: Identifiant de la transaction


        - name: body
          in: body
          required: true
          description: Informations à modifier

          schema:

            type: object

            properties:

              category:
                type: string
                example: "Food"


              notes:
                type: string
                example: "Dinner with friends"



      responses:


        200:
          description: Transaction modifiée avec succès
          schema:
            $ref: "#/definitions/Transaction"


        400:
          description: Données invalides


        404:
          description: Transaction introuvable


        500:
          description: Erreur serveur




definitions:


  Transaction:

    type: object

    properties:


      id:
        type: string
        example: "1"


      date:
        type: string
        example: "27/02/2020"


      description:
        type: string
        example: "Golden Sun Bakery"


      amount:
        type: number
        example: 8


      balance:
        type: number
        example: 298


      type:
        type: string
        example: "Electronic"


      category:
        type: string
        example: "Food"


      notes:
        type: string
        example: "lorem ipsum"
